version: '3.9'

services:

  api:
    command: >
      sh -c "npm run start:prod"
    container_name: cont_api
    depends_on:
      - mongodb
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 3000:3000
    environment:
      - MONGO_INITDB_DATABASE={MONGO_INITDB_DATABASE}
      - MONGO_URI=${MONGO_URI}
      - PLACES_API_URL={PLACES_API_URL}
      - PLACES_API_KEY={PLACES_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped
  mongodb:
    image: mongo:latest
    container_name: cont_BD_mongo
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    volumes:
      - mongo_data:/data/db
    restart: always

volumes:
  mongo_data: